<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANIME API - Documentation</title>
    <meta name="description" content="API documentation pour Anime streaming et épisodes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --accent-dim: rgba(139, 92, 246, 0.12);
            --bg: #0f0f1a;
            --surface: rgba(20, 20, 35, 0.75);
            --surface-strong: rgba(25, 25, 45, 0.92);
            --border: rgba(139, 92, 246, 0.2);
            --border-strong: rgba(139, 92, 246, 0.4);
            --text: #ffffff;
            --text-secondary: #b8b8d0;
            --text-muted: #7a7a9a;
            --green: #10b981;
            --green-dim: rgba(16, 185, 129, 0.15);
            --warning: #f59e0b;
            --error: #ef4444;
            --error-dim: rgba(239, 68, 68, 0.15);
            --radius: 16px;
            --radius-lg: 24px;
            --shadow-sm: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 20px 40px rgba(139, 92, 246, 0.2);
            --glow: 0 0 20px rgba(139, 92, 246, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb1 {
            width: 600px;
            height: 600px;
            background: rgba(139, 92, 246, 0.5);
            top: -200px;
            left: -150px;
            animation-duration: 18s;
        }

        .orb2 {
            width: 500px;
            height: 500px;
            background: rgba(59, 130, 246, 0.4);
            bottom: -150px;
            right: -100px;
            animation-duration: 25s;
            animation-delay: -5s;
        }

        .orb3 {
            width: 400px;
            height: 400px;
            background: rgba(139, 92, 246, 0.3);
            top: 40%;
            left: 40%;
            animation-duration: 22s;
            animation-delay: -2s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, -60px) scale(1.2); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Topbar */
        .topbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 64px;
            background: rgba(15, 15, 26, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 90;
            display: flex;
            align-items: center;
            padding: 0 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .hamburger {
            background: transparent;
            border: none;
            width: 44px;
            height: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
            margin-right: 16px;
        }
        .hamburger:hover {
            background: var(--accent-dim);
            transform: scale(1.05);
        }
        .hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: transform 0.3s ease, opacity 0.2s ease;
        }
        .hamburger.open span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .hamburger.open span:nth-child(2) {
            opacity: 0;
            transform: scale(0);
        }
        .hamburger.open span:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        .logo-mark {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            box-shadow: var(--glow);
        }
        .logo-text {
            font-weight: 800;
            font-size: 20px;
            background: linear-gradient(135deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-badge {
            background: var(--green-dim);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            color: var(--green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        /* Drawer */
        .drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: rgba(15, 15, 26, 0.98);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            box-shadow: 4px 0 40px rgba(0,0,0,0.5);
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .drawer.open {
            transform: translateX(0);
        }

        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        .drawer-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .close-drawer {
            background: transparent;
            border: none;
            font-size: 28px;
            color: var(--text-muted);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .close-drawer:hover {
            color: var(--error);
            background: var(--error-dim);
            transform: rotate(90deg);
        }

        .drawer-nav {
            flex: 1;
            padding: 20px 12px;
        }
        .nav-section {
            margin: 16px 0 8px 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            cursor: pointer;
            margin: 4px 0;
        }
        .nav-item i {
            width: 22px;
            color: var(--accent);
        }
        .nav-item:hover {
            background: var(--accent-dim);
            color: var(--accent-light);
            transform: translateX(5px);
        }
        .nav-item.active {
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            color: white;
            box-shadow: var(--glow);
        }
        .nav-item.active i {
            color: white;
        }

        .drawer-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
        }
        .drawer-stats {
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .stat-item .value {
            font-weight: 800;
            font-size: 20px;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-item .label {
            font-size: 10px;
            color: var(--text-muted);
        }

        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 199;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .drawer-overlay.active {
            display: block;
            opacity: 1;
        }

        /* Main Content */
        .main-content {
            padding: 84px 24px 40px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        /* Header */
        .header {
            margin-bottom: 48px;
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }
        .header h1 {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        .header p {
            color: var(--text-secondary);
            font-size: 18px;
        }
        .header-glow {
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 20px auto 0;
            border-radius: 4px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: var(--surface);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 6px;
            border: 1px solid var(--border);
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab-btn {
            padding: 12px 28px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tab-btn i {
            font-size: 16px;
        }
        .tab-btn:hover {
            color: var(--accent-light);
            background: var(--accent-dim);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            color: white;
            box-shadow: var(--glow);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--border-strong);
            box-shadow: var(--shadow-hover);
        }
        .stat-value {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* Endpoint Grid */
        .endpoint-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 24px;
        }

        .endpoint-card {
            background: var(--surface-strong);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
            animation-delay: calc(var(--delay, 0) * 0.05s);
        }
        .endpoint-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-strong);
            box-shadow: var(--shadow-hover);
        }

        .method {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .method.get { background: var(--green-dim); color: var(--green); border: 1px solid rgba(16, 185, 129, 0.3); }

        .endpoint-url {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-light);
            margin-bottom: 12px;
            word-break: break-all;
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 10px;
        }

        .endpoint-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .params {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .param {
            font-size: 12px;
            margin-bottom: 10px;
        }
        .param-name {
            font-weight: 700;
            color: var(--accent-light);
            display: inline-block;
            min-width: 80px;
        }
        .param-desc {
            color: var(--text-muted);
            font-size: 11px;
        }

        .test-input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.4);
            color: var(--text);
            font-size: 13px;
            margin-top: 6px;
            transition: all 0.2s;
        }
        .test-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-dim);
        }

        .test-btn {
            width: 100%;
            padding: 10px 16px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            color: white;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        .test-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: var(--glow);
        }
        .test-btn:active {
            transform: translateY(0);
        }

        /* Alert */
        .alert {
            padding: 14px 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: none;
            animation: fadeInUp 0.3s ease-out;
        }
        .alert-success { background: var(--green-dim); border: 1px solid rgba(16, 185, 129, 0.3); color: var(--green); }
        .alert-error { background: var(--error-dim); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--error); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--surface-strong);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            max-width: 850px;
            width: 90%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            animation: fadeInUp 0.3s ease;
        }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .close-modal {
            background: transparent;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .close-modal:hover {
            color: var(--error);
            background: var(--error-dim);
            transform: rotate(90deg);
        }
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-body pre {
            background: #0a0a0f;
            padding: 20px;
            border-radius: var(--radius);
            overflow-x: auto;
            font-size: 12px;
            font-family: 'Monaco', 'Courier New', monospace;
            white-space: pre-wrap;
            word-break: break-all;
            color: #e2e2f0;
            border: 1px solid var(--border);
        }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .modal-footer button {
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-copy {
            background: var(--accent-dim);
            color: var(--accent-light);
        }
        .btn-copy:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }
        .btn-close-modal {
            background: var(--error-dim);
            color: var(--error);
        }
        .btn-close-modal:hover {
            background: var(--error);
            color: white;
            transform: translateY(-2px);
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .status-card {
            background: var(--surface-strong);
            border-radius: var(--radius-lg);
            padding: 28px;
            border: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            .main-content { padding: 80px 16px 32px; }
            .endpoint-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 36px; }
            .tabs { border-radius: 20px; }
            .tab-btn { padding: 8px 16px; font-size: 12px; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="animated-bg">
        <div class="gradient-orb orb1"></div>
        <div class="gradient-orb orb2"></div>
        <div class="gradient-orb orb3"></div>
    </div>

    <header class="topbar">
        <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
        <div class="logo-area"><div class="logo-mark">🎬</div><span class="logo-text">ANIME API</span></div>
        <div class="topbar-right"><div class="status-badge" id="statusBadge"><i class="fas fa-circle" style="font-size: 8px; margin-right: 6px; color: var(--green);"></i> En ligne</div></div>
    </header>

    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="drawer" id="drawer">
        <div class="drawer-header"><div class="drawer-logo"><div class="logo-mark">🎬</div><span>Documentation</span></div><button class="close-drawer" id="closeDrawerBtn">&times;</button></div>
        <nav class="drawer-nav">
            <div class="nav-section">MENU</div>
            <a href="#" class="nav-item active" data-tab="overview"><i class="fas fa-home"></i><span>Aperçu</span></a>
            <a href="#" class="nav-item" data-tab="anime"><i class="fas fa-tv"></i><span>Anime</span></a>
            <a href="#" class="nav-item" data-tab="utils"><i class="fas fa-tools"></i><span>Utilitaires</span></a>
            <a href="#" class="nav-item" data-tab="status"><i class="fas fa-chart-line"></i><span>Statut</span></a>
        </nav>
        <div class="drawer-footer"><div class="drawer-stats" id="drawerStats"><div class="stat-item"><span class="value" id="statAnimes">-</span><span class="label">Animes</span></div><div class="stat-item"><span class="value" id="statPlayers">-</span><span class="label">Lecteurs</span></div></div></div>
    </aside>

    <main class="main-content">
        <div id="global-alert" class="alert"></div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="overview"><i class="fas fa-home"></i> Aperçu</button>
            <button class="tab-btn" data-tab="anime"><i class="fas fa-tv"></i> Anime</button>
            <button class="tab-btn" data-tab="utils"><i class="fas fa-tools"></i> Utilitaires</button>
            <button class="tab-btn" data-tab="status"><i class="fas fa-chart-line"></i> Statut</button>
        </div>

        <!-- Tab Content: Overview -->
        <div id="overview-tab" class="tab-content">
            <div class="header">
                <h1>ANIME API</h1>
                <p>API moderne pour récupérer épisodes, streaming et informations anime</p>
                <div class="header-glow"></div>
            </div>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><div class="stat-value" id="totalAnimes">-</div><div class="stat-label">Animes</div></div>
                <div class="stat-card"><div class="stat-value" id="totalPlayers">-</div><div class="stat-label">Lecteurs supportés</div></div>
                <div class="stat-card"><div class="stat-value" id="apiVersion">2.0</div><div class="stat-label">Version API</div></div>
                <div class="stat-card"><div class="stat-value" id="domainStatus">-</div><div class="stat-label">Statut</div></div>
            </div>
        </div>

        <!-- Tab Content: Anime -->
        <div id="anime-tab" class="tab-content" style="display:none;">
            <div class="endpoint-grid" id="animeEndpoints"></div>
        </div>

        <!-- Tab Content: Utils -->
        <div id="utils-tab" class="tab-content" style="display:none;">
            <div class="endpoint-grid" id="utilsEndpoints"></div>
        </div>

        <!-- Tab Content: Status -->
        <div id="status-tab" class="tab-content" style="display:none;">
            <div class="status-card" id="serverStatus">
                <div style="text-align:center; padding:30px;"><div class="loading"></div><p style="margin-top:16px; color:var(--text-secondary);">Chargement du statut...</p></div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="resultModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-code"></i> <span id="modalTitle">Réponse API</span></h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <pre id="modalResponse"><div class="loading"></div> Chargement...</pre>
            </div>
            <div class="modal-footer">
                <button class="btn-copy" onclick="copyResponse()"><i class="fas fa-copy"></i> Copier</button>
                <button class="btn-close-modal" onclick="closeModal()"><i class="fas fa-times"></i> Fermer</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentResponseData = '';

        // Endpoints Anime uniquement (sans scans)
        const animeEndpoints = [
            { method: 'GET', url: '/api/anime', desc: 'Liste tous les animes disponibles', params: [
                { name: 'type', desc: 'Filtre par type (anime)', default: 'anime' },
                { name: 'search', desc: 'Recherche par titre', default: '' }
            ]},
            { method: 'GET', url: '/api/anime/:id', desc: 'Détails d\'un anime (saisons disponibles)', params: [
                { name: 'id', desc: 'Nom de l\'anime (ex: jujutsu-kaisen, solo-leveling)', default: 'jujutsu-kaisen' },
                { name: 'lang', desc: 'Langue (vf ou vostfr)', default: 'vostfr' }
            ]},
            { method: 'GET', url: '/api/anime/:id/saison/:season', desc: 'Liste des épisodes d\'une saison', params: [
                { name: 'id', desc: 'Nom anime', default: 'jujutsu-kaisen' },
                { name: 'season', desc: 'Saison (ex: saison1, saison2, film, oav)', default: 'saison1' },
                { name: 'lang', desc: 'Langue', default: 'vostfr' }
            ]},
            { method: 'GET', url: '/api/anime/:id/saison/:season/episode/:number', desc: 'URLs d\'un épisode spécifique', params: [
                { name: 'id', desc: 'Nom anime', default: 'jujutsu-kaisen' },
                { name: 'season', desc: 'Saison', default: 'saison1' },
                { name: 'number', desc: 'Numéro épisode', default: '1' },
                { name: 'player', desc: 'Filtrer par lecteur (optionnel)', default: '' }
            ]}
        ];

        const utilsEndpoints = [
            { method: 'GET', url: '/api/search', desc: 'Recherche globale', params: [
                { name: 'q', desc: 'Terme de recherche (min 2 caractères)', default: 'jujutsu' },
                { name: 'type', desc: 'Filtre (anime)', default: 'anime' }
            ]},
            { method: 'GET', url: '/api/players', desc: 'Liste des lecteurs supportés', params: [] },
            { method: 'GET', url: '/api/status', desc: 'Statut du serveur', params: [] },
            { method: 'GET', url: '/api/proxy/stream', desc: 'Proxy pour streamer une vidéo', params: [
                { name: 'url', desc: 'URL de la vidéo', default: '' }
            ]},
            { method: 'GET', url: '/api/test/url', desc: 'Teste la disponibilité d\'une URL', params: [
                { name: 'url', desc: 'URL à tester', default: '' }
            ]}
        ];

        function buildUrl(endpoint, values) {
            let url = endpoint;
            for (const [key, val] of Object.entries(values)) {
                if (val && url.includes(`:${key}`)) {
                    url = url.replace(`:${key}`, encodeURIComponent(val));
                }
            }
            const queryParams = [];
            for (const [key, val] of Object.entries(values)) {
                if (val && !endpoint.includes(`:${key}`)) {
                    queryParams.push(`${key}=${encodeURIComponent(val)}`);
                }
            }
            if (queryParams.length > 0) {
                url += (url.includes('?') ? '&' : '?') + queryParams.join('&');
            }
            return url;
        }

        async function callApi(endpointUrl, paramsList) {
            const values = {};
            for (const param of paramsList) {
                const inputId = `input-${endpointUrl.replace(/[\/:]/g, '-')}-${param.name}`;
                const input = document.getElementById(inputId);
                if (input && input.value) {
                    values[param.name] = input.value;
                }
            }
            
            const fullUrl = API_BASE + buildUrl(endpointUrl, values);
            const modal = document.getElementById('resultModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalResponse = document.getElementById('modalResponse');
            
            modal.classList.add('active');
            modalTitle.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Chargement...';
            modalResponse.innerHTML = '<div class="loading"></div> Chargement...';
            
            try {
                const res = await fetch(fullUrl);
                const data = await res.json();
                currentResponseData = JSON.stringify(data, null, 2);
                modalTitle.innerHTML = '<i class="fas fa-check-circle" style="color: var(--green);"></i> Réponse API';
                modalResponse.innerHTML = `<pre>${escapeHtml(currentResponseData)}</pre>`;
            } catch (err) {
                currentResponseData = JSON.stringify({ error: err.message, url: fullUrl }, null, 2);
                modalTitle.innerHTML = '<i class="fas fa-exclamation-triangle" style="color: var(--error);"></i> Erreur';
                modalResponse.innerHTML = `<pre style="color: var(--error);">${escapeHtml(currentResponseData)}</pre>`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeModal() {
            document.getElementById('resultModal').classList.remove('active');
        }

        function copyResponse() {
            navigator.clipboard.writeText(currentResponseData);
            const btn = document.querySelector('.btn-copy');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Copié !';
            setTimeout(() => btn.innerHTML = originalText, 2000);
        }

        function renderEndpoints(containerId, endpoints) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            
            endpoints.forEach((ep, idx) => {
                const card = document.createElement('div');
                card.className = 'endpoint-card';
                card.style.setProperty('--delay', idx);
                
                let paramsHtml = '';
                ep.params.forEach(param => {
                    const inputId = `input-${ep.url.replace(/[\/:]/g, '-')}-${param.name}`;
                    paramsHtml += `
                        <div class="param">
                            <span class="param-name">${param.name}</span>
                            <span class="param-desc">${param.desc}</span>
                            <input type="text" class="test-input" id="${inputId}" placeholder="${param.default || ''}" value="${param.default || ''}">
                        </div>
                    `;
                });
                
                card.innerHTML = `
                    <span class="method get">${ep.method}</span>
                    <div class="endpoint-url">${ep.url}</div>
                    <div class="endpoint-desc">${ep.desc}</div>
                    <div class="params">${paramsHtml}</div>
                    <button class="test-btn" data-url="${ep.url}" data-params='${JSON.stringify(ep.params)}'>
                        <i class="fas fa-play"></i> Tester l'endpoint
                    </button>
                `;
                
                container.appendChild(card);
            });
            
            container.querySelectorAll('.test-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const url = btn.dataset.url;
                    const params = JSON.parse(btn.dataset.params);
                    callApi(url, params);
                });
            });
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/api/status`);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('totalAnimes').innerText = data.server.animesCount || 0;
                    const playersRes = await fetch(`${API_BASE}/api/players`);
                    const playersData = await playersRes.json();
                    const playerCount = playersData.success ? Object.keys(playersData.players || {}).length : '15';
                    document.getElementById('totalPlayers').innerText = playerCount;
                    document.getElementById('statAnimes').innerText = data.server.animesCount || 0;
                    document.getElementById('statPlayers').innerText = playerCount;
                    document.getElementById('domainStatus').innerHTML = '<i class="fas fa-check-circle"></i> Actif';
                }
            } catch(e) { console.warn(e); }
        }

        async function loadServerStatus() {
            try {
                const res = await fetch(`${API_BASE}/api/status`);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('serverStatus').innerHTML = `
                        <div class="stats-grid">
                            <div class="stat-card"><div class="stat-value">${data.server.totalCount}</div><div class="stat-label">Total Animes</div></div>
                            <div class="stat-card"><div class="stat-value">${data.server.animesCount}</div><div class="stat-label">Animes</div></div>
                            <div class="stat-card"><div class="stat-value">${Math.floor(data.server.uptime / 60)}</div><div class="stat-label">Uptime (min)</div></div>
                            <div class="stat-card"><div class="stat-value"><i class="fas fa-check-circle" style="color:var(--green);"></i></div><div class="stat-label">Statut</div></div>
                        </div>
                        <div style="margin-top:24px; padding:20px; background:var(--surface); border-radius:var(--radius);">
                            <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:16px;">
                                <div><strong><i class="fas fa-database"></i> Base:</strong> <span style="color:var(--text-muted);">${data.domain?.baseUrl?.replace(/https?:\/\//, '') || 'API'}</span></div>
                                <div><strong><i class="fas fa-clock"></i> Dernière MAJ:</strong> <span style="color:var(--text-muted);">${new Date(data.server.timestamp).toLocaleString()}</span></div>
                            </div>
                        </div>
                    `;
                }
            } catch(e) {
                document.getElementById('serverStatus').innerHTML = `<div style="text-align:center;padding:40px;"><i class="fas fa-exclamation-triangle" style="font-size:48px;color:var(--error);"></i><p style="margin-top:16px;">Erreur de connexion</p></div>`;
            }
        }

        // Tab Navigation
        let currentTab = 'overview';
        
        function switchTab(tabId) {
            currentTab = tabId;
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.dataset.tab === tabId) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            document.querySelectorAll('.tab-content').forEach(content => {
                content.style.display = 'none';
            });
            
            document.getElementById(`${tabId}-tab`).style.display = 'block';
            
            if (tabId === 'status') loadServerStatus();
            
            localStorage.setItem('activeTab', tabId);
        }

        // Sidebar
        function toggleSidebar() {
            const drawer = document.getElementById('drawer');
            const overlay = document.getElementById('drawerOverlay');
            const hamburger = document.getElementById('hamburgerBtn');
            drawer.classList.toggle('open');
            overlay.classList.toggle('active');
            hamburger.classList.toggle('open');
            document.body.style.overflow = drawer.classList.contains('open') ? 'hidden' : '';
        }
        
        function closeSidebar() {
            document.getElementById('drawer').classList.remove('open');
            document.getElementById('drawerOverlay').classList.remove('active');
            document.getElementById('hamburgerBtn').classList.remove('open');
            document.body.style.overflow = '';
        }

        // Swipe
        let touchStartX = 0;
        let touchEndX = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });
        
        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const drawer = document.getElementById('drawer');
            if (touchEndX - touchStartX > 60 && !drawer.classList.contains('open')) {
                toggleSidebar();
            } else if (touchStartX - touchEndX > 60 && drawer.classList.contains('open')) {
                closeSidebar();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderEndpoints('animeEndpoints', animeEndpoints);
            renderEndpoints('utilsEndpoints', utilsEndpoints);
            loadStats();
            
            const savedTab = localStorage.getItem('activeTab') || 'overview';
            switchTab(savedTab);
            
            document.getElementById('hamburgerBtn').addEventListener('click', toggleSidebar);
            document.getElementById('closeDrawerBtn').addEventListener('click', closeSidebar);
            document.getElementById('drawerOverlay').addEventListener('click', closeSidebar);
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    switchTab(item.dataset.tab);
                    closeSidebar();
                });
            });
        });

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    </script>
</body>
</html>
